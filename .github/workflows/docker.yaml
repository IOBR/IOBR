name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  convert-to-sif:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install SingularityCE
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libseccomp-dev \
            pkg-config \
            uidmap \
            squashfs-tools \
            cryptsetup
          
          # Install SingularityCE from source
          export VERSION=4.1.4
          wget https://github.com/sylabs/singularity/releases/download/v${VERSION}/singularity-ce-${VERSION}.tar.gz
          tar -xzf singularity-ce-${VERSION}.tar.gz
          cd singularity-ce-${VERSION}
          ./mconfig --prefix=/usr/local
          make -C builddir
          sudo make -C builddir install
          
          # Verify installation
          singularity --version

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert Docker image to SIF
        run: |
          # Get the version from the tag
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Converting Docker image to SIF for version: $VERSION"
          
          # Pull and convert the Docker image
          singularity pull docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} iobr-${VERSION}.sif
          
          # Verify the SIF file
          ls -lh iobr-${VERSION}.sif
          singularity inspect iobr-${VERSION}.sif

      - name: Upload SIF to Release
        uses: softprops/action-gh-release@v1
        with:
          files: iobr-*.sif
          body: |
            ## Docker Image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ## Singularity Image (SIF)
            Download `iobr-${{ github.ref_name }}.sif` from the assets below.

            Usage:
            ```bash
            singularity exec iobr-${{ github.ref_name }}.sif R
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
